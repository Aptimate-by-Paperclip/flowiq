name: Deploy to Staging (Vercel)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  ci-node:
    name: Node.js CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck test --filter=!@flowiq/ai-service
      # next build requires NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY; web is built in Docker
      - run: pnpm turbo run build --filter=!@flowiq/ai-service --filter=!@flowiq/web

  ci-python:
    name: Python CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest

  # ── Deploy web to Vercel ────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: [ci-node, ci-python]
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
      - name: Post deployment summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const sha = context.sha;
            const shortSha = sha.substring(0, 7);
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            if (prs.data.length === 0) return;
            const pr = prs.data[0];
            const body = [
              `## ${status} Staging Deployment (Vercel)`,
              '',
              `**Commit:** [\`${shortSha}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${sha})`,
              `**Status:** ${{ job.status }}`,
              `**Platform:** Vercel`,
              `**URL:** https://flowiq-web-caudellhenrys-projects.vercel.app`,
              '',
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
