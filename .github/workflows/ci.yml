name: CI

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Node.js: lint, typecheck, test, build ─────────────────────────────────
  node:
    name: Node.js (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter=!@flowiq/ai-service

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=!@flowiq/ai-service

      - name: Test
        run: pnpm turbo run test --filter=!@flowiq/ai-service

      - name: Build
        run: pnpm turbo run build --filter=!@flowiq/ai-service

  # ── Python: lint + test ────────────────────────────────────────────────────
  python:
    name: Python (lint / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest
